<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- Own CSP for the splash window: bundled image is 'self'; inline style only. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self'; style-src 'unsafe-inline'"
    />
    <title>Omadia</title>
    <style>
      /* Transparent window edges so the rounded card reads as a floating splash. */
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      /* Lagoon teal fallback (#108091, sampled from the artwork) behind the image. */
      .card {
        position: fixed;
        inset: 0;
        border-radius: 16px;
        overflow: hidden;
        background: #108091;
      }
      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      /* "Loading" affordance — a quiet spinner pinned to the lower edge. */
      .loader {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 22px;
        display: flex;
        justify-content: center;
      }
      .spinner {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card"><img src="./splash-lagoon.png" alt="Omadia" /></div>
    <div class="loader"><div class="spinner"></div></div>
  </body>
</html>
