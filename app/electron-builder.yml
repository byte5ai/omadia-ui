appId: ai.omadia.ui
productName: Omadia UI
directories:
  output: dist
files:
  - out/**
# Stable, arch-qualified artifact names — these are what the release
# workflow uploads to the GitHub release.
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
# Until GA signing lands, ad-hoc sign the mac bundle so downloads fail soft
# ("unverified developer", bypassable) instead of hard ("damaged").
afterPack: tools/adhocSign.cjs
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.productivity
  # Signing (issue #19, implementation-plan §7): the identity is discovered
  # from the CI keychain (CSC_LINK/CSC_KEY_PASSWORD — high5 Developer ID
  # Application). Without credentials (local dev, secretless CI) discovery
  # finds nothing, electron-builder skips signing and the afterPack hook
  # ad-hoc signs as the fail-soft fallback.
  hardenedRuntime: true
  gatekeeperAssess: false
  # apple_dev.md gotcha: the plist must contain NO XML comments —
  # AMFIUnserializeXML rejects them while plutil accepts them silently.
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
win:
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
  # the npm package name (@omadia/ui-host-app) is not path-safe — electron-
  # builder uses it as the binary name unless overridden
  executableName: omadia-ui
