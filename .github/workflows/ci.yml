name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  app:
    name: app (lint + typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # The schema/fixture parity test (test/node/fixtures.test.ts) syncs the
      # canonical contract from the @omadia/canvas-core sibling repo at test
      # time (scripts/sync-canvas-schema.mjs) and therefore cannot run on a
      # bare CI checkout. It stays a local/pre-push gate. Everything else runs
      # against the committed pre-compiled validator.
      - run: npx vitest run --exclude '**/node_modules/**' --exclude '**/fixtures.test.ts'
