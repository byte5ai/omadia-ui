# Release — every PR that lands on main produces a semantic release.
#
# Job 1 (release): semantic-release reads the conventional commits since the
# last tag, decides the next version (feat → minor, fix → patch, breaking →
# major), tags vX.Y.Z and creates the GitHub release with generated notes.
# Nothing is released when no releasable commit landed (docs/chore/ci).
#
# Job 2 (build): per-OS electron-builder runs against the released tag and
# uploads the installers (macOS dmg+zip, Windows nsis, Linux AppImage) to
# that release.
#
# Contract note: like CI, the canvas-core schema sync is optional here — the
# committed pre-compiled validator ships in the artifact either way.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic release (version + notes + GitHub release)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: needs.release.outputs.published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac
          - os: windows-latest
            args: --win
          - os: ubuntu-latest
            args: --linux
    runs-on: ${{ matrix.os }}
    env:
      OMADIA_SCHEMA_OPTIONAL: '1'
      OMADIA_REPO: ${{ github.workspace }}/omadia
      # secrets are not addressable in step-level `if` — hoist into env first
      OMADIA_CONTRACT_TOKEN: ${{ secrets.OMADIA_REPO_TOKEN }}
      # Apple signing + notarization (issue #19, implementation-plan §7).
      # _HIGH5 suffix per the apple_dev.md CI naming convention so a future
      # _BYTE5 set drops in cleanly. All optional: without them the mac build
      # falls back to the ad-hoc fail-soft path (tools/adhocSign.cjs).
      APPLE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64_HIGH5 }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD_HIGH5 }}
      APPLE_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID_HIGH5 }}
      APPLE_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID_HIGH5 }}
      APPLE_ASC_KEY_P8_BASE64: ${{ secrets.APPLE_ASC_KEY_P8_BASE64_HIGH5 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID_HIGH5 }}
    defaults:
      run:
        working-directory: app
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Checkout canvas-core contract (optional — needs OMADIA_REPO_TOKEN)
        if: ${{ env.OMADIA_CONTRACT_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: byte5ai/omadia
          token: ${{ env.OMADIA_CONTRACT_TOKEN }}
          path: omadia
          sparse-checkout: middleware/packages/canvas-core

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Stamp the released version into the app
        run: npm version ${{ needs.release.outputs.version }} --no-git-tag-version

      - run: npm run build

      # Issue #19: hand the Developer ID cert + ASC notary key to
      # electron-builder. It imports the p12 into its own TEMPORARY keychain
      # and removes it after the build (the manual create/import/teardown from
      # implementation-plan §7 — implemented by electron-builder itself, so no
      # hand-rolled `security` calls can leak). Files live in RUNNER_TEMP on
      # an ephemeral runner; secrets stay masked in logs.
      - name: Prepare Apple signing (optional — needs _HIGH5 secrets)
        if: ${{ matrix.os == 'macos-latest' && env.APPLE_P12_BASE64 != '' }}
        run: |
          printf '%s' "$APPLE_P12_BASE64" | base64 -d > "$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$APPLE_ASC_KEY_P8_BASE64" | base64 -d > "$RUNNER_TEMP/asc-key.p8"
          {
            echo "CSC_LINK=file://$RUNNER_TEMP/developer-id.p12"
            echo "CSC_KEY_PASSWORD=$APPLE_P12_PASSWORD"
            echo "APPLE_API_KEY=$RUNNER_TEMP/asc-key.p8"
            echo "APPLE_API_KEY_ID=$APPLE_ASC_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_ASC_ISSUER_ID"
            echo "EB_NOTARIZE=--config.mac.notarize=true"
          } >> "$GITHUB_ENV"

      - name: Package installers
        run: npx electron-builder ${{ matrix.args }} ${EB_NOTARIZE:-} --publish never

      # The .app is notarized + stapled by electron-builder above; the DMG
      # needs its own ticket for `stapler validate`/`spctl -t install` to
      # pass on the disk image itself (apple_dev.md / plan §7).
      - name: Notarize + staple the DMGs
        if: ${{ matrix.os == 'macos-latest' && env.APPLE_P12_BASE64 != '' }}
        run: |
          for dmg in dist/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --key "$RUNNER_TEMP/asc-key.p8" \
              --key-id "$APPLE_ASC_KEY_ID" \
              --issuer "$APPLE_ASC_ISSUER_ID" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Verify signatures (acceptance gate, issue #19)
        if: ${{ matrix.os == 'macos-latest' && env.APPLE_P12_BASE64 != '' }}
        run: |
          set -x
          for app in dist/mac*/*.app; do
            codesign --verify --deep --strict "$app"
            if codesign -dv "$app" 2>&1 | grep -q 'Signature=adhoc'; then
              echo "FAIL: $app is ad-hoc signed — the Developer ID did not apply" >&2
              exit 1
            fi
            xcrun stapler validate "$app"
          done
          for dmg in dist/*.dmg; do
            spctl -a -vv -t install "$dmg"
            xcrun stapler validate "$dmg"
          done

      - name: Tear down signing material
        if: ${{ always() && matrix.os == 'macos-latest' && env.APPLE_P12_BASE64 != '' }}
        run: rm -f "$RUNNER_TEMP/developer-id.p12" "$RUNNER_TEMP/asc-key.p8"

      - name: Upload installers to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(dist/*.dmg dist/*.zip dist/*.exe dist/*.AppImage dist/*.blockmap)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no installer artifacts found in dist/" >&2
            exit 1
          fi
          gh release upload "v${{ needs.release.outputs.version }}" "${files[@]}" --clobber
