<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Omadia UI — Kiosk Lumen mockup (Lume · Lagoon)</title>
<!--
  Mockup of a single kiosk Lumen, rendered faithfully in the Lume material
  (light-as-material, NOT glass) per docs/visual-spec.md v0.5 §4.13, dark mode base,
  Lagoon palette (default). Illustrates the render-cadence model from
  docs/interactivity-concept.md §5:
    • static   — brand chrome, layout, tagline        (rendered once)
    • reactive — clock (1 Hz), selected feature detail (re-eval on change)
    • tick     — Ken-Burns hero, CTA glow pulse, motes (declarative, GPU)
  All "logic" here is illustrative; in a real Lumen it is declarative LX +
  declarative animation. Tap the feature chips. Toggle the cadence overlay
  (bottom-right) to see which regions update at which cadence.
  The hero stands in for provided image material delivered via a DataRef.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;450;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
<style>
:root{
  /* ---- Lume surface tokens (dark mode is the base) ---- */
  --canvas-top:#232631; --canvas-btm:#1B1D24;
  --surface-top:#2A2D38; --surface-btm:#23262F;
  --raised-top:#303440; --raised-btm:#292C37;
  --sunken-top:#1D1F26; --sunken-btm:#16181E;

  /* ---- Text ---- */
  --text-primary:#EEEFF3; --text-secondary:#B6B9C3; --text-tertiary:#888B95;

  /* ---- Borders (directional: top catches light) ---- */
  --border-subtle-top:rgba(255,255,255,0.06); --border-subtle-btm:rgba(0,0,0,0.40);
  --border-default-top:rgba(255,255,255,0.10); --border-default-btm:rgba(0,0,0,0.50);

  /* ---- Accent · Lagoon (dark) ---- */
  --accent:#6FC8D6; --accent-hover:#88D2DE; --accent-active:#A1DCE6;
  --accent-subtle:rgba(111,200,214,0.20);
  --accent-glow:rgba(111,200,214,0.32);
  --accent-glow-strong:rgba(111,200,214,0.48);
  --accent-glow-core:rgba(210,245,250,0.50);

  /* ---- Radius / motion ---- */
  --r-sm:6px; --r-md:8px; --r-lg:12px; --r-pill:999px;
  --ease-standard:cubic-bezier(0.22,0.61,0.36,1.00);
  --ease-emphasis:cubic-bezier(0.40,0.00,0.20,1.00);

  --font-sans:'Geist',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'Geist Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --font-serif:'Source Serif 4',Charter,'Iowan Old Style',Georgia,serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-sans);
  color:var(--text-primary);
  background:linear-gradient(180deg,var(--canvas-top) 0%,var(--canvas-btm) 100%);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ===========================================================
   KIOSK FRAME (depth-1 pane: bg.surface, directional border,
   radius.lg) — STATIC region
   =========================================================== */
.kiosk{
  position:fixed; inset:0; padding:clamp(16px,3.2vh,32px);
  display:flex;
}
.pane{
  position:relative; flex:1; min-height:0;
  border-radius:var(--r-lg);
  background:linear-gradient(180deg,var(--surface-top) 0%,var(--surface-btm) 100%);
  border:1px solid var(--border-subtle-btm);
  border-top-color:var(--border-subtle-top);
  box-shadow:0 1px 0 rgba(255,255,255,0.05) inset, 0 24px 60px rgba(0,0,0,0.45);
  overflow:hidden;
  display:grid;
  grid-template-columns:1.35fr 0.95fr;
}

/* ---- HERO (left) : Ken-Burns backdrop = TICK region ---- */
.hero{position:relative; overflow:hidden}
.hero__bg{
  position:absolute; inset:-8%;
  /* Stand-in for provided image material (delivered via DataRef).
     Lagoon "lit water / bioluminescence" luminosity. */
  background:
    radial-gradient(58% 50% at 32% 30%, rgba(111,200,214,0.55) 0%, rgba(111,200,214,0.0) 60%),
    radial-gradient(45% 60% at 78% 78%, rgba(31,143,163,0.55) 0%, rgba(31,143,163,0.0) 62%),
    radial-gradient(40% 40% at 70% 18%, rgba(210,245,250,0.30) 0%, rgba(210,245,250,0.0) 55%),
    linear-gradient(150deg,#0c2a31 0%, #103840 38%, #0a2026 100%);
  filter:saturate(1.05);
  animation:kenburns 24s var(--ease-standard) infinite alternate;
  transform-origin:38% 42%;
}
.hero__grain{
  position:absolute; inset:0; opacity:0.10; mix-blend-mode:overlay; pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
.hero__vignette{position:absolute; inset:0; background:radial-gradient(120% 100% at 35% 40%, transparent 45%, rgba(0,0,0,0.45) 100%)}

/* floating light-motes — TICK, but cheap (declarative, GPU transforms) */
.motes{position:absolute; inset:0; pointer-events:none}
.mote{position:absolute; width:6px; height:6px; border-radius:50%;
  background:radial-gradient(circle,var(--accent-glow-core) 0%, var(--accent-glow) 50%, transparent 70%);
  filter:blur(0.3px); opacity:0; animation:drift linear infinite}

/* product silhouette — a clean SVG stands in for a product photo */
.hero__product{position:absolute; inset:0; display:grid; place-items:center}
.hero__product svg{width:min(46%,360px); height:auto; filter:drop-shadow(0 30px 60px rgba(0,0,0,0.55))}
.halo{
  position:absolute; left:50%; top:50%; width:min(52%,420px); aspect-ratio:1; transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle, var(--accent-glow) 0%, transparent 62%);
  animation:halo-breathe 6s ease-in-out infinite;
}

/* hero copy overlay — STATIC (eyebrow/title) + REACTIVE (price) */
.hero__copy{position:absolute; left:clamp(20px,3vw,40px); bottom:clamp(20px,3.2vh,36px); right:24px}
.eyebrow{font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent)}
.title{font-size:clamp(34px,5vw,58px); font-weight:600; letter-spacing:-0.02em; line-height:1.02; margin-top:10px}
.tagline{font-family:var(--font-serif); font-size:clamp(15px,1.5vw,18px); line-height:1.55; color:var(--text-secondary); max-width:30ch; margin-top:12px}

/* ---- CONTENT PANEL (right) ---- */
.panel{position:relative; display:flex; flex-direction:column; padding:clamp(18px,2.6vh,30px); gap:18px;
  background:linear-gradient(180deg,var(--surface-top) 0%,var(--surface-btm) 100%);
  border-left:1px solid var(--border-subtle-btm)}

/* top chrome: brand + clock — STATIC brand, REACTIVE clock (1 Hz) */
.topbar{display:flex; align-items:center; justify-content:space-between}
.brand{display:flex; align-items:center; gap:10px; font-weight:600; letter-spacing:-0.01em}
.brand .dot{width:10px; height:10px; border-radius:50%; background:var(--accent);
  box-shadow:0 0 4px var(--accent-glow-core), 0 0 12px var(--accent-glow)}
.clock{font-family:var(--font-mono); font-size:13px; font-weight:450; color:var(--text-tertiary); font-variant-numeric:tabular-nums}

.panel__lead{font-family:var(--font-serif); font-size:17px; line-height:1.6; color:var(--text-secondary)}

/* feature chips — touch hit-targets ≥44px, REACTIVE selection */
.chips{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.chip{
  min-height:56px; display:flex; align-items:center; gap:12px;
  padding:0 16px; border-radius:var(--r-md); cursor:pointer;
  color:var(--text-primary); text-align:left; font:inherit;
  background:linear-gradient(180deg,var(--raised-top) 0%,var(--raised-btm) 100%);
  border:1px solid var(--border-subtle-btm); border-top-color:var(--border-subtle-top);
  box-shadow:0 1px 0 rgba(255,255,255,0.06) inset;
  transition:transform var(--ease-standard) .12s, border-color .12s, box-shadow .18s;
  -webkit-tap-highlight-color:transparent;
}
.chip:active{transform:translateY(1px) scale(0.99)}
.chip[aria-pressed="true"]{
  border-color:var(--accent);
  background:linear-gradient(180deg,var(--raised-top) 0%,var(--raised-btm) 100%), var(--accent-subtle);
  background-blend-mode:overlay,normal;
  box-shadow:0 1px 0 rgba(255,255,255,0.06) inset, 0 0 4px var(--accent-glow-core), 0 4px 12px var(--accent-glow);
}
.chip .ic{width:26px; height:26px; flex:none; color:var(--accent)}
.chip .lb{display:flex; flex-direction:column; line-height:1.2}
.chip .lb b{font-size:14px; font-weight:600}
.chip .lb span{font-size:11.5px; color:var(--text-tertiary)}

/* detail well — REACTIVE, content condenses in on tap (per §3.5) */
.detail{
  flex:1; min-height:0; border-radius:var(--r-md); padding:20px;
  background:linear-gradient(180deg,var(--sunken-top) 0%,var(--sunken-btm) 100%);
  border:1px solid var(--border-subtle-btm);
  display:flex; flex-direction:column; gap:14px; overflow:hidden;
}
.detail__head{display:flex; align-items:baseline; justify-content:space-between; gap:12px}
.detail__head h3{font-size:18px; font-weight:600; letter-spacing:-0.01em}
.detail__metric{font-family:var(--font-mono); font-size:13px; font-weight:450; color:var(--accent); font-variant-numeric:tabular-nums}
.detail__body{font-family:var(--font-serif); font-size:15.5px; line-height:1.62; color:var(--text-secondary)}
.specs{margin-top:auto; display:grid; grid-template-columns:1fr 1fr; gap:10px 18px}
.spec{display:flex; flex-direction:column; gap:2px}
.spec dt{font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:var(--text-tertiary)}
.spec dd{font-family:var(--font-mono); font-size:14px; font-weight:450; color:var(--text-primary); font-variant-numeric:tabular-nums}

/* the condensation transition applied when detail content swaps */
.swap{animation:condense .8s var(--ease-emphasis) both}

/* primary CTA — pulsing two-stop glow = TICK (declarative, GPU) */
.cta{
  position:relative; min-height:60px; border:none; cursor:pointer;
  border-radius:var(--r-sm); font:inherit; font-size:16px; font-weight:600; letter-spacing:0.01em;
  color:#0a2026; background:linear-gradient(180deg,var(--accent-active) 0%,var(--accent) 100%);
  display:flex; align-items:center; justify-content:center; gap:10px;
  animation:cta-pulse 2.6s ease-in-out infinite;
  -webkit-tap-highlight-color:transparent;
}
.cta:active{transform:translateY(1px)}
.cta .arrow{transition:transform .2s var(--ease-standard)}
.cta:active .arrow{transform:translateX(3px)}

/* ===========================================================
   Keyframes — all "presentation motion" (declarative, GPU),
   none of it is LX recomputation
   =========================================================== */
@keyframes kenburns{
  0%{transform:scale(1.0) translate3d(0,0,0)}
  100%{transform:scale(1.14) translate3d(-2.5%,-1.8%,0)}
}
@keyframes halo-breathe{0%,100%{opacity:.55; transform:translate(-50%,-50%) scale(0.98)}50%{opacity:.85; transform:translate(-50%,-50%) scale(1.04)}}
@keyframes cta-pulse{
  0%,100%{box-shadow:0 0 4px var(--accent-glow-core), 0 4px 12px var(--accent-glow)}
  50%{box-shadow:0 0 6px var(--accent-glow-core), 0 6px 20px var(--accent-glow-strong)}
}
@keyframes drift{
  0%{opacity:0; transform:translate3d(0,12px,0)}
  12%{opacity:.9}
  88%{opacity:.7}
  100%{opacity:0; transform:translate3d(18px,-120px,0)}
}
@keyframes condense{
  0%{opacity:0; transform:scale(1.03); filter:blur(2px)}
  40%{opacity:.95; filter:blur(0)}
  100%{opacity:1; transform:scale(1); filter:blur(0)}
}

/* ===========================================================
   Optional cadence overlay (off by default)
   =========================================================== */
.cad{position:fixed; right:18px; bottom:18px; z-index:40; display:flex; gap:8px; align-items:center}
.cad__btn{
  font:inherit; font-size:12.5px; font-weight:600; cursor:pointer;
  color:var(--text-secondary); padding:9px 14px; border-radius:var(--r-pill);
  background:linear-gradient(180deg,var(--raised-top),var(--raised-btm));
  border:1px solid var(--border-default-btm); border-top-color:var(--border-default-top);
  box-shadow:0 1px 0 rgba(255,255,255,0.06) inset;
}
[data-cad="on"] [data-c]{outline-offset:-2px; position:relative}
[data-cad="on"] [data-c="static"]{outline:1.5px dashed rgba(150,156,168,0.55)}
[data-cad="on"] [data-c="reactive"]{outline:1.5px dashed rgba(120,200,255,0.7)}
[data-cad="on"] [data-c="tick"]{outline:1.5px dashed var(--accent)}
[data-cad="on"] [data-c]::after{
  content:attr(data-c); position:absolute; top:4px; left:4px; z-index:5;
  font:600 9.5px/1 var(--font-mono); letter-spacing:.08em; text-transform:uppercase;
  padding:3px 6px; border-radius:4px; color:#0a2026; background:rgba(150,156,168,0.9);
}
[data-cad="on"] [data-c="reactive"]::after{background:rgba(120,200,255,0.92)}
[data-cad="on"] [data-c="tick"]::after{background:var(--accent)}

@media (prefers-reduced-motion:reduce){
  .hero__bg,.halo,.cta,.mote{animation:none!important}
  .swap{animation:none!important}
}
@media (max-width:820px){
  .pane{grid-template-columns:1fr; grid-template-rows:1.1fr 1.4fr}
  .panel{border-left:none; border-top:1px solid var(--border-subtle-btm)}
}
</style>
</head>
<body>
<main class="kiosk">
  <div class="pane">

    <!-- ============ HERO (tick: Ken-Burns + motes + halo) ============ -->
    <section class="hero" data-c="tick" aria-label="Product hero">
      <div class="hero__bg"></div>
      <div class="hero__grain"></div>
      <div class="motes" id="motes"></div>
      <div class="hero__product">
        <div class="halo"></div>
        <svg viewBox="0 0 200 260" fill="none" aria-hidden="true">
          <defs>
            <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#3a4350"/><stop offset="1" stop-color="#1c2128"/>
            </linearGradient>
            <radialGradient id="grille" cx="0.5" cy="0.42" r="0.6">
              <stop offset="0" stop-color="#6FC8D6" stop-opacity="0.55"/>
              <stop offset="0.5" stop-color="#2a3942" stop-opacity="0.9"/>
              <stop offset="1" stop-color="#11161b"/>
            </radialGradient>
          </defs>
          <rect x="40" y="20" width="120" height="220" rx="60" fill="url(#body)" stroke="rgba(255,255,255,0.08)"/>
          <rect x="52" y="34" width="96" height="150" rx="48" fill="url(#grille)"/>
          <circle cx="100" cy="106" r="30" fill="none" stroke="rgba(210,245,250,0.45)" stroke-width="1.5"/>
          <circle cx="100" cy="106" r="14" fill="rgba(111,200,214,0.30)"/>
          <rect x="78" y="206" width="44" height="6" rx="3" fill="rgba(210,245,250,0.6)"/>
        </svg>
      </div>
      <div class="hero__vignette"></div>
      <div class="hero__copy">
        <div class="eyebrow" data-c="static">New · 2026</div>
        <h1 class="title" data-c="static">AURA<span style="color:var(--accent)"> Halo</span></h1>
        <p class="tagline" data-c="static">A speaker that lights the room it fills. Spatial sound, condensed out of light.</p>
      </div>
    </section>

    <!-- ============ CONTENT PANEL ============ -->
    <section class="panel">
      <div class="topbar">
        <div class="brand" data-c="static"><span class="dot"></span> AURA Studio</div>
        <div class="clock" data-c="reactive" id="clock">--:--:--</div>
      </div>

      <p class="panel__lead" data-c="static">Tap a feature to explore. Everything you see was composed by the agent — layout, motion and copy — and rendered natively in Lume.</p>

      <div class="chips" role="group" aria-label="Features">
        <button class="chip" data-c="reactive" aria-pressed="true" data-key="sound">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M16 9a4 4 0 0 1 0 6M19 6a8 8 0 0 1 0 12"/></svg>
          <span class="lb"><b>Sound</b><span>360° spatial</span></span>
        </button>
        <button class="chip" data-c="reactive" aria-pressed="false" data-key="battery">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="8" width="15" height="9" rx="2"/><path d="M21 11v3"/><path d="M6 11v3"/></svg>
          <span class="lb"><b>Battery</b><span>All-day play</span></span>
        </button>
        <button class="chip" data-c="reactive" aria-pressed="false" data-key="material">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M12 12l8-4.5M12 12v9M12 12L4 7.5"/></svg>
          <span class="lb"><b>Materials</b><span>Anodised shell</span></span>
        </button>
        <button class="chip" data-c="reactive" aria-pressed="false" data-key="connect">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          <span class="lb"><b>Connect</b><span>Multi-room</span></span>
        </button>
      </div>

      <div class="detail" data-c="reactive" id="detail" aria-live="polite"></div>

      <button class="cta" data-c="tick"><span>Tap to explore</span><span class="arrow" aria-hidden="true">→</span></button>
    </section>
  </div>
</main>

<div class="cad">
  <button class="cad__btn" id="cadBtn" type="button">Show cadence overlay</button>
</div>

<script>
/* ---- REACTIVE clock: 1 Hz, NOT 60 Hz (illustrates reactive cadence) ---- */
const clock = document.getElementById('clock');
function tickClock(){
  const d = new Date();
  clock.textContent = [d.getHours(),d.getMinutes(),d.getSeconds()]
    .map(n=>String(n).padStart(2,'0')).join(':');
}
tickClock(); setInterval(tickClock, 1000);

/* ---- Feature data (would be Lumen state + a loadData/DataRef in reality) ---- */
const DATA = {
  sound:    {title:'Spatial Sound',  metric:'108 dB',  body:'Six drivers fire in a ring, beam-forming the room into a single lit stage. The agent tunes the field to the space it’s placed in.', specs:[['Drivers','6 × 2.5″'],['Peak','108 dB'],['Range','45 Hz–22 kHz'],['Latency','18 ms']]},
  battery:  {title:'All-Day Battery', metric:'30 hrs',  body:'A full day of continuous play, then a fifteen-minute charge buys another five hours. The halo dims to amber as it nears empty.', specs:[['Playtime','30 hrs'],['Quick-charge','15 min → 5 hr'],['Cell','9 600 mAh'],['Standby','40 days']]},
  material: {title:'Anodised Shell',  metric:'410 g',   body:'A single block of anodised aluminium, bead-blasted to a soft matte that catches light the way Lume does — luminous, never glassy.', specs:[['Weight','410 g'],['Shell','6061-T6 Al'],['Finish','Bead-blast'],['Rating','IP67']]},
  connect:  {title:'Multi-Room',      metric:'∞ rooms', body:'Drop one in every room and they find each other. Hand audio across the home with a swipe, or let the agent route it to where you are.', specs:[['Protocol','Wi-Fi 6E'],['Codec','aptX Loss.'],['Rooms','Unlimited'],['Pairing','Auto-mesh']]},
};

const detail = document.getElementById('detail');
function render(key){
  const d = DATA[key];
  detail.innerHTML =
    '<div class="swap" style="display:flex;flex-direction:column;gap:14px;height:100%">'
    +'<div class="detail__head"><h3>'+d.title+'</h3><span class="detail__metric">'+d.metric+'</span></div>'
    +'<p class="detail__body">'+d.body+'</p>'
    +'<dl class="specs">'+d.specs.map(s=>'<div class="spec"><dt>'+s[0]+'</dt><dd>'+s[1]+'</dd></div>').join('')+'</dl>'
    +'</div>';
}
render('sound');

/* ---- Touch-reactive chips (tap = the universal Lumen 'tap' event) ---- */
document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed', c===chip ? 'true':'false'));
    render(chip.dataset.key);
  });
});

/* ---- Light-motes: a few cheap GPU-animated dots ---- */
const motes = document.getElementById('motes');
for(let i=0;i<14;i++){
  const m=document.createElement('span'); m.className='mote';
  m.style.left=(8+Math.random()*84)+'%';
  m.style.top=(40+Math.random()*55)+'%';
  const dur=(7+Math.random()*9).toFixed(1);
  m.style.animationDuration=dur+'s';
  m.style.animationDelay=(-Math.random()*dur)+'s';
  m.style.transform='scale('+(0.6+Math.random()*1.1).toFixed(2)+')';
  motes.appendChild(m);
}

/* ---- Cadence overlay toggle ---- */
const cadBtn=document.getElementById('cadBtn');
cadBtn.addEventListener('click', ()=>{
  const on = document.body.getAttribute('data-cad')==='on';
  document.body.setAttribute('data-cad', on?'off':'on');
  cadBtn.textContent = on ? 'Show cadence overlay' : 'Hide cadence overlay';
});
</script>
</body>
</html>
